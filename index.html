<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/jfif" href="/src/assets/brndee_logo.jfif" />
    
    <title>Brnde | Premium LinkedIn Brand Design</title>
    <meta name="description" content="Brnde is LinkedIn's #1 brand design agency. We help creators and founders build premium personal brands with strategic design." />
    <link rel="canonical" href="https://brnde.com/" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Brnde",
      "image": "https://brnde.com/src/assets/brndee_logo.jfif",
      "@id": "https://brnde.com/",
      "url": "https://brnde.com/",
      "telephone": "",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "",
        "addressLocality": "",
        "postalCode": "",
        "addressCountry": ""
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 0,
        "longitude": 0
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": [
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday"
        ],
        "opens": "09:00",
        "closes": "18:00"
      },
      "sameAs": [
        "https://www.linkedin.com/company/brnde",
        "https://twitter.com/brnde"
      ],
      "description": "LinkedIn's #1 brand design agency. We help creators and founders build premium personal brands."
    }
    </script>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://brnde.com/" />
    <meta property="og:title" content="Brnde | #1 LinkedIn Brand Design Agency" />
    <meta property="og:description" content="Transform your LinkedIn presence with high-impact, premium brand design." />
    <meta property="og:image" content="/src/assets/mahi-profile.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://brnde.com/" />
    <meta property="twitter:title" content="Brnde | #1 LinkedIn Brand Design Agency" />
    <meta property="twitter:description" content="Transform your LinkedIn presence with high-impact, premium brand design." />
    <meta property="twitter:image" content="/src/assets/mahi-profile.png" />

    <meta name="theme-color" content="#09090B" />
  </head>
  <body class="antialiased selection:bg-[#A855F7]/30 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
